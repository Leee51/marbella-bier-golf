<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pub Golf Marbella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0A09;
    --panel:#191412;
    --panel-2:#221B17;
    --line:#332A23;
    --orange:#FF6B1A;
    --amber:#FFB347;
    --bone:#F5EFE6;
    --muted:#9A8D7E;
    --danger:#E23B3B;
    --green:#4CAF6E;
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--bone);
    font-family:'Inter',system-ui,sans-serif;
    display:flex;flex-direction:column;
    min-height:100dvh;
    overflow-x:hidden;
  }
  h1,h2{font-family:'Anton',sans-serif;letter-spacing:.04em;text-transform:uppercase;font-weight:400}

  header{
    padding:20px 20px 14px;
    text-align:center;
    border-bottom:1px solid var(--line);
    background:
      radial-gradient(120% 100% at 50% 0%, rgba(255,107,26,.14), transparent 60%),
      var(--bg);
  }
  header h1{font-size:clamp(26px,7vw,38px);line-height:1}
  header h1 span{color:var(--orange)}
  header p{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:.14em;text-transform:uppercase}

  main{flex:1;width:100%;max-width:560px;margin:0 auto;padding:18px 16px 96px}

  nav{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    display:flex;
    background:rgba(12,10,9,.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;padding:14px 0 12px;
    background:none;border:none;cursor:pointer;
    color:var(--muted);
    font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
    border-top:2px solid transparent;
    transition:color .15s;
  }
  nav button.active{color:var(--orange);border-top-color:var(--orange)}
  nav button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}

  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ── Glücksrad ── */
  .wheel-wrap{position:relative;width:min(86vw,380px);margin:8px auto 0}
  .wheel-wrap::before{
    content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    border:14px solid transparent;border-top:22px solid var(--bone);
    z-index:5;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
  }
  canvas{width:100%;height:auto;display:block;border-radius:50%;
    box-shadow:0 0 0 6px var(--panel),0 0 0 8px var(--line),0 18px 50px rgba(255,107,26,.18)}
  .hub{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:64px;height:64px;border-radius:50%;
    background:var(--bg);border:2px solid var(--orange);
    display:flex;align-items:center;justify-content:center;
    font-family:'Anton',sans-serif;font-size:13px;color:var(--orange);letter-spacing:.05em;
    z-index:4;pointer-events:none;
  }
  #spinBtn{
    display:block;width:100%;max-width:380px;margin:22px auto 0;
    padding:16px;border:none;border-radius:var(--radius);cursor:pointer;
    background:linear-gradient(135deg,var(--orange),#E5510A);
    color:#140A02;font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.1em;text-transform:uppercase;
    box-shadow:0 6px 20px rgba(255,107,26,.35);
    transition:transform .1s;
  }
  #spinBtn:active{transform:scale(.97)}
  #spinBtn:disabled{opacity:.45;box-shadow:none;cursor:default}
  #spinBtn:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
  .legend{
    margin:20px auto 0;max-width:380px;
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
  }
  .legend div{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;font-size:13px;color:var(--muted);
    display:flex;align-items:center;gap:8px;
  }
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  #resultOverlay{
    position:fixed;inset:0;z-index:100;display:none;
    align-items:center;justify-content:center;
    background:rgba(12,10,9,.9);backdrop-filter:blur(6px);
    padding:24px;
  }
  #resultOverlay.show{display:flex}
  .result-card{
    background:var(--panel);border:1px solid var(--orange);border-radius:20px;
    padding:36px 28px;text-align:center;max-width:340px;width:100%;
    animation:stamp .35s cubic-bezier(.2,1.6,.4,1);
    box-shadow:0 0 60px rgba(255,107,26,.3);
  }
  @keyframes stamp{from{transform:scale(1.4);opacity:0}to{transform:scale(1);opacity:1}}
  .result-card .emoji{font-size:56px;line-height:1}
  .result-card h2{font-size:34px;margin:12px 0 6px;color:var(--orange)}
  .result-card p{color:var(--muted);font-size:14px;margin-bottom:22px}
  .result-card button{
    width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;
    background:var(--bone);color:#140A02;
    font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.08em;text-transform:uppercase;
  }

  /* ── Scorecard ── */
  .teams-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
  .teams-row input{
    width:100%;padding:10px 8px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line);color:var(--bone);
    font-family:'Anton',sans-serif;font-size:14px;text-align:center;letter-spacing:.04em;text-transform:uppercase;
  }
  .teams-row input:focus{outline:2px solid var(--orange);border-color:var(--orange)}
  .teams-row input:nth-child(1){border-bottom:3px solid #FF6B1A}
  .teams-row input:nth-child(2){border-bottom:3px solid #FFB347}
  .teams-row input:nth-child(3){border-bottom:3px solid #2E7FB8}
  .teams-hint{text-align:center;color:var(--muted);font-size:11px;margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase}

  .col-heads{
    position:sticky;top:0;z-index:20;
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    background:rgba(12,10,9,.95);backdrop-filter:blur(8px);
    padding:8px 0;margin-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .col-heads span{
    text-align:center;font-family:'Anton',sans-serif;font-size:12px;
    letter-spacing:.06em;text-transform:uppercase;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;
  }
  .col-heads span:nth-child(1){color:#FF6B1A}
  .col-heads span:nth-child(2){color:#FFB347}
  .col-heads span:nth-child(3){color:#2E7FB8}

  .section-title{
    font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin:20px 4px 10px;
  }
  .hole{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;
  }
  .hole-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .hole-num{font-family:'Anton',sans-serif;font-size:22px;color:var(--orange);min-width:26px}
  .hole-name{font-size:14px;font-weight:600}
  .hole-sub{font-size:11px;color:var(--muted);margin-left:auto;text-transform:uppercase;letter-spacing:.08em}
  .hole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stepper{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;
  }
  .hole-grid .stepper:nth-child(1){box-shadow:inset 0 3px 0 0 #FF6B1A}
  .hole-grid .stepper:nth-child(2){box-shadow:inset 0 3px 0 0 #FFB347}
  .hole-grid .stepper:nth-child(3){box-shadow:inset 0 3px 0 0 #2E7FB8}
  .stepper button{
    width:36px;height:44px;border:none;background:none;cursor:pointer;
    color:var(--orange);font-size:20px;font-weight:800;font-family:'Inter',sans-serif;
  }
  .stepper button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .stepper span{font-family:'Anton',sans-serif;font-size:20px;min-width:28px;text-align:center}
  .stepper.worst{border-color:var(--danger)}
  .stepper.worst span{color:var(--danger)}
  .loser-badge{
    margin-top:10px;text-align:center;
    background:rgba(226,59,59,.12);border:1px solid rgba(226,59,59,.4);
    border-radius:10px;padding:8px;font-size:12.5px;color:#F0A0A0;
  }
  .loser-badge b{color:var(--danger)}
  .pause{
    background:repeating-linear-gradient(-45deg,var(--panel),var(--panel) 10px,var(--panel-2) 10px,var(--panel-2) 20px);
    border:1px dashed var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;text-align:center;
    color:var(--muted);font-size:13px;letter-spacing:.06em;
  }
  .pause b{color:var(--amber);font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.08em}

  /* Kuvert-Reihen */
  .kuvert-row{margin-bottom:12px}
  .kuvert-row:last-child{margin-bottom:0}
  .kuvert-label{
    display:flex;align-items:center;gap:8px;
    font-size:13px;font-weight:600;margin-bottom:6px;
  }
  .kuvert-label .val{color:var(--green);font-weight:800;margin-left:auto;font-size:12px}

  /* ── Auswertung (simpel) ── */
  .standings{margin-top:26px}
  .standings h2{font-size:20px;margin-bottom:4px}
  .standings .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .stand-row{
    display:flex;align-items:center;gap:14px;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:10px;
  }
  .stand-row.leader{border-color:var(--orange);background:linear-gradient(90deg,rgba(255,107,26,.12),var(--panel) 65%)}
  .stand-rank{font-family:'Anton',sans-serif;font-size:26px;color:var(--muted);min-width:36px;text-align:center}
  .stand-row.leader .stand-rank{color:var(--orange)}
  .stand-info{min-width:0}
  .stand-name{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stand-detail{font-size:12px;color:var(--muted);margin-top:3px}
  .stand-detail .minus{color:var(--green)}
  .stand-detail .plus{color:var(--danger)}
  .stand-tag{
    display:inline-block;margin-top:6px;
    font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    padding:3px 8px;border-radius:6px;
  }
  .stand-tag.win{background:rgba(255,107,26,.15);color:var(--orange)}
  .stand-tag.lose{background:rgba(226,59,59,.15);color:var(--danger)}
  .stand-total{margin-left:auto;text-align:right;flex-shrink:0}
  .stand-total .num{font-family:'Anton',sans-serif;font-size:38px;line-height:1}
  .stand-row.leader .stand-total .num{color:var(--orange)}
  .stand-total .lbl{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin-top:14px;line-height:1.6}
  .reset{
    display:block;margin:18px auto 0;padding:10px 22px;
    background:none;border:1px solid var(--line);border-radius:10px;cursor:pointer;
    color:var(--muted);font-size:13px;
  }
  .reset:active{color:var(--danger);border-color:var(--danger)}

  @media (prefers-reduced-motion: reduce){
    .view.active{animation:none}
    .result-card{animation:none}
  }
</style>
</head>
<body>

<header>
  <h1>PUB GOLF <span>MARBELLA</span></h1>
  <p>Der 18. · 5 Löcher · 3 Teams</p>
</header>

<main>
  <!-- ══ GLÜCKSRAD ══ -->
  <section id="view-wheel" class="view active">
    <div class="wheel-wrap">
      <canvas id="wheel" width="760" height="760" aria-label="Glücksrad"></canvas>
      <div class="hub">DREH!</div>
    </div>
    <button id="spinBtn">🎡 Glücksrad drehen</button>
    <div class="legend" id="legend"></div>
  </section>

  <!-- ══ SCORECARD ══ -->
  <section id="view-score" class="view">
    <div class="teams-row" id="teamInputs"></div>
    <p class="teams-hint">Teamnamen antippen zum Ändern</p>
    <div class="col-heads" id="colHeads">
      <span>Team A</span><span>Team B</span><span>Team C</span>
    </div>

    <p class="section-title">🏌️ Schläge pro Loch</p>
    <div id="holes"></div>

    <p class="section-title">✉️ Kuverts (gelöste Challenges)</p>
    <div class="hole" id="kuverts"></div>

    <p class="section-title">⏱️ Verspätung (Minuten)</p>
    <div class="hole"><div class="hole-grid" id="delayGrid"></div></div>

    <div class="standings">
      <h2>🏆 Rangliste</h2>
      <p class="sub">Wenigste Punkte gewinnt · Kuverts zählen minus, Verspätung plus</p>
      <div id="standings"></div>
    </div>
    <button class="reset" id="resetBtn">Scorecard zurücksetzen</button>
  </section>
</main>

<nav>
  <button id="tab-wheel" class="active" onclick="showView('wheel')">🎡 Glücksrad</button>
  <button id="tab-score" onclick="showView('score')">🏌️ Scorecard</button>
</nav>

<div id="resultOverlay" role="dialog" aria-modal="true">
  <div class="result-card">
    <div class="emoji" id="resEmoji"></div>
    <h2 id="resTitle"></h2>
    <p id="resSub"></p>
    <button onclick="closeResult()">Weiter</button>
  </div>
</div>

<script>
/* ══════════ GLÜCKSRAD ══════════ */
const SEGMENTS = [
  { label:'SHOT',        emoji:'🥃', sub:'Ein Straf-Shot. Sofort. Keine Diskussion.',       color:'#FF6B1A' },
  { label:'WASSER',      emoji:'💧', sub:'Ein grosses Glas Wasser exen. Eure Leber dankt.', color:'#2E7FB8' },
  { label:'NICHTS',      emoji:'🍀', sub:'Begnadigung! Das Rad zeigt Gnade.',               color:'#3E362E' },
  { label:'HALBES BIER', emoji:'🍺', sub:'Ein halbes Bier auf ex – runter damit.',          color:'#E8A020' },
  { label:'WASSER',      emoji:'💧', sub:'Ein grosses Glas Wasser exen. Eure Leber dankt.', color:'#2E7FB8' },
  { label:'SHOT',        emoji:'🥃', sub:'Ein Straf-Shot. Sofort. Keine Diskussion.',       color:'#FF6B1A' },
  { label:'NOCHMAL',     emoji:'🔄', sub:'Das Rad will mehr – sofort nochmal drehen!',      color:'#8C4DD4' },
  { label:'NICHTS',      emoji:'🍀', sub:'Begnadigung! Das Rad zeigt Gnade.',               color:'#3E362E' },
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const N = SEGMENTS.length;
const SLICE = (2*Math.PI)/N;
let angle = -Math.PI/2 - SLICE/2;
let spinning = false;

function drawWheel(a){
  const cx=380, cy=380, r=372;
  ctx.clearRect(0,0,760,760);
  for(let i=0;i<N;i++){
    const start = a + i*SLICE;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+SLICE);
    ctx.closePath();
    ctx.fillStyle = SEGMENTS[i].color;
    ctx.fill();
    ctx.strokeStyle = '#0C0A09';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + SLICE/2);
    ctx.textAlign='right';
    ctx.fillStyle='#F5EFE6';
    ctx.font='700 34px Inter, sans-serif';
    ctx.fillText(SEGMENTS[i].emoji, r-36, 12);
    ctx.font='400 30px Anton, sans-serif';
    ctx.fillText(SEGMENTS[i].label, r-88, 11);
    ctx.restore();
  }
}
document.fonts.ready.then(()=>drawWheel(angle));
drawWheel(angle);

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function spin(){
  if(spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const target = Math.floor(Math.random()*N);
  const finalAngle = -Math.PI/2 - target*SLICE - SLICE/2 + (Math.random()*.7-.35)*SLICE*.8;
  const turns = reduceMotion ? 1 : 5 + Math.floor(Math.random()*3);
  const startAngle = angle;
  let delta = (finalAngle - startAngle) % (2*Math.PI);
  if(delta > 0) delta -= 2*Math.PI;
  delta -= turns * 2*Math.PI;
  const duration = reduceMotion ? 600 : 4200;
  const t0 = performance.now();

  function frame(t){
    const p = Math.min((t-t0)/duration, 1);
    const ease = 1 - Math.pow(1-p, 4);
    angle = startAngle + delta*ease;
    drawWheel(angle);
    if(p < 1){ requestAnimationFrame(frame); }
    else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showResult(SEGMENTS[target]);
    }
  }
  requestAnimationFrame(frame);
}
document.getElementById('spinBtn').addEventListener('click', spin);

function showResult(seg){
  document.getElementById('resEmoji').textContent = seg.emoji;
  document.getElementById('resTitle').textContent = seg.label;
  document.getElementById('resSub').textContent = seg.sub;
  document.getElementById('resultOverlay').classList.add('show');
  if(navigator.vibrate) navigator.vibrate([60,40,120]);
}
function closeResult(){
  document.getElementById('resultOverlay').classList.remove('show');
}

const legendEl = document.getElementById('legend');
[...new Map(SEGMENTS.map(s=>[s.label,s])).values()].forEach(s=>{
  const d = document.createElement('div');
  d.innerHTML = '<span class="dot" style="background:'+s.color+'"></span>'+s.emoji+' '+s.label;
  legendEl.appendChild(d);
});

/* ══════════ SCORECARD ══════════ */
const HOLES = [
  { id:1, name:'Strand',       sub:'Faro de Marbella' },
  { id:2, name:'Tapas-Stopp',  sub:'Altstadt' },
  { id:3, name:'Orangenplatz', sub:'Pl. de los Naranjos' },
  { id:5, name:'Finale',       sub:'Puerto Banús' },
];
const KUVERTS = [
  { key:'g', label:'🟢 Grün',   worth:1 },
  { key:'o', label:'🟠 Orange', worth:2 },
  { key:'r', label:'🔴 Rot',    worth:3 },
];

const state = {
  teams: ['Team A','Team B','Team C'],
  scores: Object.fromEntries(HOLES.map(h=>[h.id,[0,0,0]])),
  kuverts: { g:[0,0,0], o:[0,0,0], r:[0,0,0] },
  delay: [0,0,0],
};

const STORAGE_KEY = 'pubgolf-marbella-state';

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.teams) state.teams = saved.teams;
    if(saved.scores) Object.assign(state.scores, saved.scores);
    if(saved.kuverts) Object.assign(state.kuverts, saved.kuverts);
    if(saved.delay) state.delay = saved.delay;
  }catch(e){}
}
loadState();

const teamInputs = document.getElementById('teamInputs');
state.teams.forEach((t,i)=>{
  const inp = document.createElement('input');
  inp.value = t;
  inp.maxLength = 12;
  inp.setAttribute('aria-label','Teamname '+(i+1));
  inp.addEventListener('input', ()=>{ state.teams[i] = inp.value.trim() || 'Team '+(i+1); render(); });
  teamInputs.appendChild(inp);
});

function makeStepper(get, set){
  const wrap = document.createElement('div');
  wrap.className = 'stepper';
  const minus = document.createElement('button'); minus.textContent='−'; minus.setAttribute('aria-label','minus');
  const val = document.createElement('span'); val.textContent = get();
  const plus = document.createElement('button'); plus.textContent='+'; plus.setAttribute('aria-label','plus');
  minus.onclick = ()=>{ set(Math.max(0, get()-1)); val.textContent=get(); render(); };
  plus.onclick  = ()=>{ set(get()+1); val.textContent=get(); render(); };
  wrap.append(minus, val, plus);
  return wrap;
}

const holesEl = document.getElementById('holes');
const holeSteppers = {};
const holeBadges = {};

function buildAll(){
  // Löcher
  holesEl.innerHTML = '';
  HOLES.forEach(h=>{
    if(h.id === 5){
      const pause = document.createElement('div');
      pause.className = 'pause';
      pause.innerHTML = '<b>LOCH 4 · BANÚS-PAUSE</b><br>Chill-Cocktail ohne Ansage – keine Punkte ☮️';
      holesEl.appendChild(pause);
    }
    const card = document.createElement('div');
    card.className = 'hole';
    card.innerHTML = '<div class="hole-head">'
      + '<span class="hole-num">'+h.id+'</span>'
      + '<span class="hole-name">'+h.name+'</span>'
      + '<span class="hole-sub">'+h.sub+'</span>'
      + '</div>';
    const grid = document.createElement('div');
    grid.className = 'hole-grid';
    holeSteppers[h.id] = [];
    for(let i=0;i<3;i++){
      const st = makeStepper(
        ()=>state.scores[h.id][i],
        v=>state.scores[h.id][i]=v
      );
      holeSteppers[h.id].push(st);
      grid.appendChild(st);
    }
    card.appendChild(grid);
    const badge = document.createElement('div');
    badge.style.display = 'none';
    badge.className = 'loser-badge';
    holeBadges[h.id] = badge;
    card.appendChild(badge);
    holesEl.appendChild(card);
  });

  // Kuverts: drei Reihen (grün/orange/rot)
  const kEl = document.getElementById('kuverts');
  kEl.innerHTML = '';
  KUVERTS.forEach(k=>{
    const row = document.createElement('div');
    row.className = 'kuvert-row';
    const label = document.createElement('div');
    label.className = 'kuvert-label';
    label.innerHTML = k.label + ' <span class="val">−'+k.worth+' pro Kuvert</span>';
    row.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'hole-grid';
    for(let i=0;i<3;i++){
      grid.appendChild(makeStepper(
        ()=>state.kuverts[k.key][i],
        v=>state.kuverts[k.key][i]=v
      ));
    }
    row.appendChild(grid);
    kEl.appendChild(row);
  });

  // Verspätung
  const dEl = document.getElementById('delayGrid');
  dEl.innerHTML = '';
  for(let i=0;i<3;i++){
    dEl.appendChild(makeStepper(
      ()=>state.delay[i],
      v=>state.delay[i]=v
    ));
  }
}
buildAll();

function totals(){
  return [0,1,2].map(i=>{
    const schlaege = HOLES.reduce((s,h)=>s+state.scores[h.id][i],0);
    const kuvertBonus = KUVERTS.reduce((s,k)=>s + state.kuverts[k.key][i]*k.worth, 0);
    return {
      i,
      name: state.teams[i],
      schlaege,
      kuvertBonus,
      delay: state.delay[i],
      total: schlaege + state.delay[i] - kuvertBonus,
    };
  });
}

function escapeHTML(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(){
  saveState();
  const heads = document.getElementById('colHeads').children;
  for(let i=0;i<3;i++) heads[i].textContent = state.teams[i];

  // Loch-Verlierer markieren
  HOLES.forEach(h=>{
    const vals = state.scores[h.id];
    const max = Math.max(...vals);
    const losers = vals.map((v,i)=>v===max?i:-1).filter(i=>i>=0);
    holeSteppers[h.id].forEach((st,i)=>{
      st.classList.toggle('worst', max>0 && vals[i]===max);
    });
    const badge = holeBadges[h.id];
    if(max>0 && losers.length===1){
      badge.style.display = 'block';
      badge.innerHTML = '🎡 <b>'+escapeHTML(state.teams[losers[0]])+'</b> dreht am Glücksrad!';
    } else if(max>0 && losers.length>1){
      badge.style.display = 'block';
      badge.innerHTML = '🎡 Gleichstand – <b>'+losers.map(i=>escapeHTML(state.teams[i])).join(' & ')+'</b> drehen beide!';
    } else {
      badge.style.display = 'none';
    }
  });

  // Rangliste: simpel & klar
  const rows = totals().sort((a,b)=>a.total-b.total);
  const el = document.getElementById('standings');
  el.innerHTML = '';
  const allZero = rows.every(r=>r.total===0 && r.schlaege===0 && r.kuvertBonus===0 && r.delay===0);
  rows.forEach((r,idx)=>{
    const isLeader = idx===0 && !allZero;
    const isLast = idx===rows.length-1 && rows[0].total !== r.total;
    const div = document.createElement('div');
    div.className = 'stand-row' + (isLeader?' leader':'');
    let tag = '';
    if(isLeader) tag = '<span class="stand-tag win">👑 Führt</span>';
    if(isLast)   tag = '<span class="stand-tag lose">💸 Zahlt die erste Fitz-Runde</span>';
    div.innerHTML =
      '<span class="stand-rank">'+(isLeader?'👑':(idx+1)+'.')+'</span>'
      + '<span class="stand-info">'
      +   '<div class="stand-name">'+escapeHTML(r.name)+'</div>'
      +   '<div class="stand-detail">'
      +     r.schlaege+' Schläge'
      +     (r.kuvertBonus>0 ? ' · <span class="minus">−'+r.kuvertBonus+' Kuverts</span>' : '')
      +     (r.delay>0 ? ' · <span class="plus">+'+r.delay+' Verspätung</span>' : '')
      +   '</div>'
      +   tag
      + '</span>'
      + '<span class="stand-total"><div class="num">'+r.total+'</div><div class="lbl">Punkte</div></span>';
    el.appendChild(div);
  });
}
render();

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Alle Punkte auf 0 zurücksetzen?')) return;
  HOLES.forEach(h=>state.scores[h.id]=[0,0,0]);
  state.kuverts = { g:[0,0,0], o:[0,0,0], r:[0,0,0] };
  state.delay = [0,0,0];
  buildAll();
  render();
});

/* ══════════ TABS ══════════ */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
</script>
</body>
</html>
